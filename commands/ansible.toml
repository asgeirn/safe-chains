[[command]]
name = "ansible-playbook"
url = "https://docs.ansible.com/ansible/latest/cli/ansible-playbook.html"
level = "Inert"
bare = false
require_any = ["--list-hosts", "--list-tasks", "--list-tags", "--syntax-check"]
standalone = [
    "--help", "--list-hosts", "--list-tags", "--list-tasks",
    "--syntax-check", "--version",
    "-h",
]
valued = [
    "--connection", "--extra-vars", "--inventory", "--limit",
    "--tags", "--skip-tags",
    "-C", "-c", "-e", "-i", "-l", "-t",
]

[[command]]
name = "ansible-inventory"
url = "https://docs.ansible.com/ansible/latest/cli/ansible-inventory.html"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "--list"
standalone = ["--help", "--yaml", "--toml", "--export", "-h", "-y"]
valued = ["--inventory", "--limit", "-i", "-l"]

[[command.sub]]
name = "--graph"
standalone = ["--help", "--vars", "-h"]
valued = ["--inventory", "--limit", "-i", "-l"]

[[command.sub]]
name = "--host"
bare = false
standalone = ["--help", "-h"]
valued = ["--inventory", "-i"]

[[command]]
name = "ansible-doc"
url = "https://docs.ansible.com/ansible/latest/cli/ansible-doc.html"
level = "Inert"
bare = true
standalone = [
    "--help", "--json", "--list", "--metadata-dump", "--version",
    "-F", "-h", "-j", "-l",
]
valued = ["--module-path", "--type", "-M", "-t"]

[[command]]
name = "ansible-config"
url = "https://docs.ansible.com/ansible/latest/cli/ansible-config.html"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "dump"
standalone = ["--help", "--only-changed", "-h"]

[[command.sub]]
name = "view"
standalone = ["--help", "-h"]

[[command]]
name = "ansible-galaxy"
url = "https://docs.ansible.com/ansible/latest/cli/ansible-galaxy.html"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "info"
bare = false
standalone = ["--help", "-h"]

[[command.sub]]
name = "search"
standalone = ["--help", "-h"]
valued = ["--author", "--galaxy-tags", "--platforms"]
