max_positional = 0
[[command.sub.sub]]
name = "config"
standalone = [
    "--dry-run", "--hash", "--help", "--images", "--no-consistency",
    "--no-interpolate", "--no-normalize", "--no-path-resolution",
    "--profiles", "--quiet", "--resolve-image-digests",
    "--services", "--volumes",
    "-h", "-q",
]
valued = ["--format", "--output", "-o"]
[[command.sub.sub]]
name = "images"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ls"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "ps"
standalone = [
    "--all", "--help", "--no-trunc", "--orphans", "--quiet",
    "--services",
    "-a", "-h", "-q",
]
valued = ["--filter", "--format", "--status"]
[[command.sub.sub]]
name = "top"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "version"
standalone = ["--help", "-h"]

[[command.sub]]
name = "container"
[[command.sub.sub]]
