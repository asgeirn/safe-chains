[[command]]
name = "yarn"
url = "https://yarnpkg.com/cli"
bare_flags = ["--help", "--version", "-V", "-h"]
first_arg = ["test", "test:*"]
level = "SafeRead"

[[command.sub]]
name = "list"
standalone = ["--help", "--json", "--long", "--production", "-h"]
valued = ["--depth", "--pattern"]

[[command.sub]]
name = "ls"
standalone = ["--help", "--json", "--long", "--production", "-h"]
valued = ["--depth", "--pattern"]

[[command.sub]]
name = "info"
standalone = ["--help", "--json", "-h"]

[[command.sub]]
name = "why"
standalone = ["--help", "--json", "-h"]
