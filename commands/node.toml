[[command.sub]]
name = "current"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command.sub]]
name = "list"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command.sub]]
name = "ls"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command.sub]]
name = "ls-remote"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command.sub]]
name = "version"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command.sub]]
name = "which"
level = "Inert"
standalone = ["--help", "--lts", "--no-colors", "-h"]

[[command]]
