# Skipped CommandDef with Custom: npm (check_npm_run), bun (check_bun_x)
# Skipped custom handler: yarn

[[command]]
name = "pnpm"
url = "https://pnpm.io/pnpm-cli"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "list"
level = "Inert"
standalone = ["--dev", "--help", "--json", "--long", "--no-optional", "--parseable", "--production", "--recursive", "-P", "-h", "-r"]
valued = ["--depth", "--filter"]

[[command.sub]]
name = "ls"
level = "Inert"
standalone = ["--dev", "--help", "--json", "--long", "--no-optional", "--parseable", "--production", "--recursive", "-P", "-h", "-r"]
valued = ["--depth", "--filter"]

[[command.sub]]
name = "audit"
level = "Inert"
standalone = ["--help", "--json", "--recursive", "-h", "-r"]
valued = ["--filter"]

[[command.sub]]
name = "outdated"
level = "Inert"
standalone = ["--help", "--json", "--recursive", "-h", "-r"]
valued = ["--filter"]

[[command.sub]]
name = "why"
level = "Inert"
standalone = ["--help", "--json", "--recursive", "-h", "-r"]
valued = ["--filter"]

[[command]]
name = "deno"
url = "https://docs.deno.com/runtime/reference/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "check"
level = "SafeRead"
standalone = ["--help", "--json", "--no-lock", "--quiet", "--unstable", "-h", "-q"]
valued = ["--config", "--import-map", "-c"]

[[command.sub]]
name = "doc"
level = "Inert"
standalone = ["--help", "--json", "--no-lock", "--quiet", "--unstable", "-h", "-q"]
valued = ["--config", "--import-map", "-c"]

[[command.sub]]
name = "fmt"
guard = "--check"
level = "Inert"
bare = false
standalone = ["--check", "--help", "--no-semicolons", "--single-quote", "--unstable", "-h", "-q"]
valued = ["--config", "--ext", "--ignore", "--indent-width", "--line-width", "--log-level", "--prose-wrap", "-c"]

[[command.sub]]
name = "info"
level = "Inert"
standalone = ["--help", "--json", "--no-lock", "--quiet", "--unstable", "-h", "-q"]
valued = ["--config", "--import-map", "-c"]

[[command.sub]]
name = "lint"
level = "SafeRead"
standalone = ["--help", "--json", "--no-lock", "--quiet", "--unstable", "-h", "-q"]
valued = ["--config", "--import-map", "-c"]

[[command.sub]]
name = "test"
level = "SafeRead"
standalone = ["--help", "--json", "--no-lock", "--quiet", "--unstable", "-h", "-q"]
valued = ["--config", "--import-map", "-c"]

[[command]]
name = "nvm"
