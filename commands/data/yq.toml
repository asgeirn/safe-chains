[[command]]
name = "yq"
url = "https://mikefarah.gitbook.io/yq"
level = "Inert"
bare = false
standalone = [
    "--colors", "--exit-status", "--help", "--no-colors", "--no-doc", "--null-input",
    "--prettyPrint", "--version",
    "-C", "-M", "-N", "-P", "-V", "-e", "-h", "-r",
]
valued = [
    "--arg", "--argjson", "--expression", "--front-matter",
    "--indent", "--input-format", "--output-format",
    "-I", "-p",
]
