[[command]]
name = "pip"
aliases = ["pip3"]
url = "https://pip.pypa.io/en/stable/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "list"
standalone = [
    "--editable", "--exclude-editable", "--help", "--include-editable",
    "--local", "--not-required", "--outdated", "--pre",
    "--uptodate", "--user",
    "-e", "-h", "-i", "-l", "-o",
]
valued = ["--exclude", "--format", "--index-url", "--path"]

[[command.sub]]
name = "show"
bare = false
standalone = ["--files", "--help", "--verbose", "-f", "-h", "-v"]

[[command.sub]]
name = "freeze"
standalone = [
    "--all", "--exclude-editable", "--help", "--local", "--user",
    "-h", "-l",
]
valued = ["--exclude", "--path"]

[[command.sub]]
name = "check"
standalone = ["--help", "-h"]

[[command.sub]]
name = "config"
[[command.sub.sub]]
name = "get"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "list"
standalone = ["--help", "-h"]

[[command.sub]]
name = "debug"
standalone = ["--help", "-h"]

[[command.sub]]
name = "help"
standalone = ["--help", "-h"]

[[command.sub]]
name = "index"
standalone = ["--help", "-h"]

[[command.sub]]
name = "inspect"
standalone = ["--help", "-h"]

[[command]]
name = "uv"
url = "https://docs.astral.sh/uv/reference/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "pip"
[[command.sub.sub]]
name = "list"
standalone = [
    "--editable", "--exclude-editable", "--help", "--outdated",
    "--strict", "-h",
]
valued = ["--exclude", "--format", "--python"]
[[command.sub.sub]]
name = "show"
bare = false
standalone = ["--files", "--help", "--verbose", "-h", "-v"]
valued = ["--python"]
[[command.sub.sub]]
name = "check"
standalone = ["--help", "--verbose", "-h", "-v"]
valued = ["--python"]
[[command.sub.sub]]
name = "freeze"
standalone = ["--help", "--verbose", "-h", "-v"]
valued = ["--python"]

[[command.sub]]
name = "python"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--verbose", "-h", "-v"]
valued = ["--python"]

[[command.sub]]
name = "tool"
[[command.sub.sub]]
name = "list"
standalone = ["--help", "--verbose", "-h", "-v"]
valued = ["--python"]

[[command]]
name = "poetry"
url = "https://python-poetry.org/docs/cli/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "show"
standalone = [
    "--all", "--help", "--latest", "--no-dev", "--outdated",
    "--top-level", "--tree",
    "-T", "-h", "-l", "-o",
]
valued = ["--why"]

[[command.sub]]
name = "check"
standalone = ["--help", "--lock", "-h"]

[[command.sub]]
name = "env"
[[command.sub.sub]]
name = "info"
standalone = ["--full-path", "--help", "-h"]
[[command.sub.sub]]
name = "list"
standalone = ["--full-path", "--help", "-h"]

[[command]]
name = "pyenv"
url = "https://github.com/pyenv/pyenv#readme"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "help"
standalone = ["--bare", "--help", "-h"]

[[command.sub]]
name = "root"
standalone = ["--bare", "--help", "-h"]

[[command.sub]]
name = "shims"
standalone = ["--bare", "--help", "-h"]

[[command.sub]]
name = "version"
standalone = ["--bare", "--help", "-h"]

[[command.sub]]
name = "versions"
standalone = ["--bare", "--help", "-h"]

[[command.sub]]
name = "which"
standalone = ["--bare", "--help", "-h"]
