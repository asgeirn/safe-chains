aliases = ["mlocate", "plocate"]
standalone = [
    "--all", "--basename", "--count", "--existing",
    "--follow", "--help", "--ignore-case", "--null", "--quiet",
    "--statistics", "--version", "--wholename",
    "-0", "-A", "-S", "-V", "-b", "-c", "-e", "-h", "-i", "-q", "-w",
]
valued = ["--database", "--limit", "-d", "-l", "-n"]

