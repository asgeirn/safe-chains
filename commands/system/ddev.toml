[[command]]
name = "ddev"
url = "https://ddev.readthedocs.io/en/stable/users/usage/commands/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "aliases"
standalone = ["--help", "-h"]

[[command.sub]]
name = "debug"
[[command.sub.sub]]
name = "configyaml"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "diagnose"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "mutagen"
standalone = ["--help", "-h"]
[[command.sub.sub]]
name = "test"
standalone = ["--help", "-h"]

[[command.sub]]
name = "describe"
standalone = ["--help", "--json-output", "-h", "-j"]

[[command.sub]]
name = "list"
standalone = ["--help", "--json-output", "-h", "-j"]

[[command.sub]]
name = "logs"
standalone = ["--follow", "--help", "--time", "--timestamps", "-f", "-h"]
valued = ["--service", "--tail", "-s", "-t"]

[[command.sub]]
name = "snapshot"
guard = "--list"
standalone = ["--all", "--help", "--list", "-h"]

[[command.sub]]
name = "status"
standalone = ["--help", "--json-output", "-h", "-j"]

[[command.sub]]
name = "version"
standalone = ["--help", "-h"]
