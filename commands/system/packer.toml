[[command]]
name = "packer"
url = "https://developer.hashicorp.com/packer/docs/commands"
bare_flags = ["--help", "--version", "-h"]

[[command.sub]]
name = "validate"
standalone = [
    "--help", "--no-warn-undeclared-var", "--syntax-only",
    "-h",
]
valued = [
    "--except", "--only", "--var", "--var-file",
    "-e", "-o",
]

[[command.sub]]
name = "inspect"
standalone = ["--help", "--machine-readable", "-h"]

[[command.sub]]
name = "fmt"
guard = "--check"
standalone = ["--check", "--diff", "--help", "--recursive", "-h"]
valued = ["--write"]
