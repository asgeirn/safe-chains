[[command]]
name = "fastlane"
url = "https://docs.fastlane.tools/"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "action"
bare = false
standalone = ["--help", "-h"]
max_positional = 1

[[command.sub]]
name = "actions"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "env"
standalone = ["--help", "-h"]
max_positional = 0

[[command.sub]]
name = "lanes"
standalone = ["--help", "-h"]
max_positional = 0
