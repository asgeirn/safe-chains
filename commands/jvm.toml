# Skipped CommandDef: gradle, keytool
# Skipped custom handlers: mvn, jar, jarsigner

[[command]]
name = "detekt"
url = "https://detekt.dev/docs/gettingstarted/cli/"
level = "SafeRead"
bare = true
standalone = [
    "--build-upon-default-config", "--debug", "--help", "--parallel", "--version",
    "-V", "-h",
]
valued = [
    "--baseline", "--classpath", "--config", "--config-resource",
    "--excludes", "--includes", "--input", "--jvm-target",
    "--language-version", "--plugins", "--report",
]

[[command]]
name = "javap"
url = "https://docs.oracle.com/en/java/javase/21/docs/specs/man/javap.html"
level = "Inert"
bare = false
standalone = [
    "--help", "--version", "-V", "-c", "-constants", "-h", "-l",
    "-p", "-private", "-protected", "-public", "-s", "-sysinfo", "-v", "-verbose",
]
valued = ["--module", "-bootclasspath", "-classpath", "-cp", "-m"]

[[command]]
name = "ktlint"
url = "https://pinterest.github.io/ktlint/latest/"
level = "SafeRead"
bare = true
standalone = [
    "--color", "--color-name", "--help", "--relative", "--verbose", "--version",
    "-V", "-h",
]
valued = ["--editorconfig", "--reporter"]
