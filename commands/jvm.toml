[[command]]
name = "jarsigner"
url = "https://docs.oracle.com/en/java/javase/21/docs/specs/man/jarsigner.html"
level = "Inert"
bare = false
require_any = ["-verify"]
standalone = ["-certs", "-strict", "-verbose", "-verify", "-help", "-h"]

[[command]]
name = "detekt"
url = "https://detekt.dev/docs/gettingstarted/cli/"
level = "SafeRead"
bare = true
standalone = [
    "--build-upon-default-config", "--debug", "--help", "--parallel", "--version",
    "-V", "-h",
]
valued = [
    "--baseline", "--classpath", "--config", "--config-resource",
    "--excludes", "--includes", "--input", "--jvm-target",
    "--language-version", "--plugins", "--report",
]

[[command]]
name = "javap"
url = "https://docs.oracle.com/en/java/javase/21/docs/specs/man/javap.html"
level = "Inert"
bare = false
standalone = [
    "--help", "--version", "-V", "-c", "-constants", "-h", "-l",
    "-p", "-private", "-protected", "-public", "-s", "-sysinfo", "-v", "-verbose",
]
valued = ["--module", "-bootclasspath", "-classpath", "-cp", "-m"]

[[command]]
name = "ktlint"
url = "https://pinterest.github.io/ktlint/latest/"
level = "SafeRead"
bare = true
standalone = [
    "--color", "--color-name", "--help", "--relative", "--verbose", "--version",
    "-V", "-h",
]
valued = ["--editorconfig", "--reporter"]

[[command]]
name = "gradle"
aliases = ["gradlew"]
url = "https://docs.gradle.org/current/userguide/command_line_interface.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "build"
level = "SafeWrite"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]

[[command.sub]]
name = "check"
level = "SafeRead"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]

[[command.sub]]
name = "dependencies"
standalone = [
    "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--configuration"]

[[command.sub]]
name = "properties"
standalone = [
    "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]

[[command.sub]]
name = "tasks"
standalone = [
    "--all", "--console", "--help", "--info", "--no-rebuild",
    "--quiet", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--group"]

[[command.sub]]
name = "test"
level = "SafeRead"
standalone = [
    "--build-cache", "--configure-on-demand", "--console",
    "--continue", "--dry-run", "--help", "--info", "--no-build-cache",
    "--no-daemon", "--no-parallel", "--no-rebuild",
    "--parallel", "--profile", "--quiet", "--rerun-tasks",
    "--scan", "--stacktrace", "--warning-mode",
    "-h", "-q",
]
valued = ["--exclude-task", "--max-workers", "-x"]

[[command]]
name = "keytool"
url = "https://docs.oracle.com/en/java/javase/21/docs/specs/man/keytool.html"
bare_flags = ["--help", "--version", "-V", "-h"]

[[command.sub]]
name = "-list"
standalone = ["--help", "-h", "-rfc", "-v"]
valued = ["-alias", "-keystore", "-storepass", "-storetype"]
max_positional = 0

[[command.sub]]
name = "-printcert"
standalone = ["--help", "-h", "-rfc", "-v"]
valued = ["-file", "-jarfile"]
max_positional = 0
