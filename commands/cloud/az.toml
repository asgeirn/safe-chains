[[command]]
name = "az"
url = "https://learn.microsoft.com/en-us/cli/azure/"
bare_flags = ["--help", "-h", "--version"]
[command.wrapper]
standalone = ["--debug", "--only-show-errors", "--verbose"]
valued = ["--output", "--query", "--subscription", "-o"]

[[command.sub]]
name = "version"
positional_style = true

[[command.sub]]
name = "account"
first_arg = ["list", "show", "list-locations"]
positional_style = true

[[command.sub]]
name = "group"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "vm"
first_arg = ["list", "show", "list-sizes", "list-ip-addresses"]
positional_style = true

[[command.sub]]
name = "network"
[[command.sub.sub]]
name = "vnet"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "nsg"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "public-ip"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "nic"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "aks"
first_arg = ["list", "show", "get-credentials"]
positional_style = true

[[command.sub]]
name = "webapp"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "functionapp"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "storage"
[[command.sub.sub]]
name = "account"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "sql"
[[command.sub.sub]]
name = "server"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "db"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "ad"
[[command.sub.sub]]
name = "user"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "group"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "app"
first_arg = ["list", "show"]
positional_style = true
[[command.sub.sub]]
name = "sp"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "resource"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "monitor"
[[command.sub.sub]]
name = "metrics"
first_arg = ["list"]
positional_style = true
[[command.sub.sub]]
name = "log-analytics"
first_arg = ["query"]
positional_style = true

[[command.sub]]
name = "keyvault"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "acr"
[[command.sub.sub]]
name = "list"
positional_style = true
[[command.sub.sub]]
name = "show"
positional_style = true
[[command.sub.sub]]
name = "repository"
first_arg = ["list", "show"]
positional_style = true

[[command.sub]]
name = "cosmosdb"
first_arg = ["list", "show"]
positional_style = true
